<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Expense Tracker</h1>
            <p>Manage your expenses efficiently</p>
        </div>

        <div class="input-section">
            <div class="form-group">
                <label for="expenseName">Expense Name:</label>
                <input 
                    type="text" 
                    id="expenseName" 
                    placeholder="e.g., Grocery, Gas, Rent"
                    maxlength="50"
                >
            </div>

            <div class="form-group">
                <label for="expenseAmount">Amount:</label>
                <input 
                    type="number" 
                    id="expenseAmount" 
                    placeholder="e.g., 50.00"
                    min="0"
                    step="0.01"
                >
            </div>

            <button id="addBtn" class="add-btn">Add Expense</button>
        </div>

        <div class="summary-section">
            <div class="total-box">
                <p class="total-label">Total Expenses</p>
                <p class="total-amount">$<span id="totalAmount">0.00</span></p>
            </div>
        </div>

        <div class="expenses-section">
            <h2>Expenses List</h2>
            <div id="expensesList" class="expenses-list">
                <p class="no-expenses">No expenses yet. Add one to get started!</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
