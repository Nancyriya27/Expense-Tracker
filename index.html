<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 class="header-title">💰 Expense Tracker</h1>
        <p class="header-subtitle">Manage your expenses efficiently</p>
    </header>

    <div class="container">
        <div class="card">
            <div class="card-body">
                <h3>Add New Expense</h3>
                
                <div class="form-group">
                    <label for="expenseName">Expense Description:</label>
                    <input 
                        type="text" 
                        id="expenseName" 
                        placeholder="e.g., Grocery, Gas, Rent"
                        maxlength="50"
                    >
                </div>

                <div class="form-group">
                    <label for="expenseAmount">Amount ($):</label>
                    <input 
                        type="number" 
                        id="expenseAmount" 
                        placeholder="e.g., 50.00"
                        min="0"
                        step="0.01"
                    >
                </div>

                <div class="btn-group">
                    <button id="addBtn" class="btn btn-primary btn-full">
                        ✓ Add Expense
                    </button>
                </div>
            </div>
        </div>

        <div class="total-section">
            <p class="total-label">💵 Total Expenses</p>
            <p class="total-amount">$<span id="totalAmount">0.00</span></p>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>Expenses List</h2>
            </div>
            <div class="card-body">
                <div id="expensesList" class="list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p class="empty-state-title">No expenses yet</p>
                        <p class="empty-state-text">Add an expense to get started!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
